name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0). Leave empty for auto-increment'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release
        id: latest
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$LATEST" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing release found"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
            echo "Latest release: $LATEST"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            TAG="v1.0.0"
          else
            CURRENT="${{ steps.latest.outputs.tag }}"
            NUM=$(echo "$CURRENT" | sed 's/[^0-9]//g')
            NUM=$((NUM + 1))
            TAG="v${NUM}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Download APK artifact
        run: |
          ARTIFACT_NAME="${{ needs.build.outputs.artifact-name }}"
          echo "Downloading artifact: $ARTIFACT_NAME"

          gh api "repos/{owner}/{repo}/actions/artifacts" \
            --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id" \
            > /tmp/artifact_id.txt

          ARTIFACT_ID=$(cat /tmp/artifact_id.txt)
          echo "Artifact ID: $ARTIFACT_ID"

          gh api "repos/{owner}/{repo}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/apk.zip
          mkdir -p /tmp/apk
          unzip /tmp/apk.zip -d /tmp/apk
          echo "Downloaded files:"
          find /tmp/apk -name "*.apk"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commits since last release
        id: commits
        run: |
          if [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${{ steps.latest.outputs.tag }}"..HEAD)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- No changes"
          fi

          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          EXISTS="${{ steps.latest.outputs.exists }}"
          TAG="${{ steps.tag.outputs.tag }}"

          if [ "$EXISTS" = "false" ]; then
            TITLE="$TAG — Initial Release"
            BODY="## What's New

This is the first official release of **NeoLibEditor** — an ELF shared library editor for Android.

### Features
- **Address Patching** — Read and patch memory offsets in .so files
- **String Editor** — Extract, search, and replace strings
- **Multi-architecture** — ARM64, ARMv7, x86, x86_64 support
- **Backup & Revert** — Safe experimentation with automatic backups
- **Material 3 UI** — Modern design with dark/light theme support

### Included Changes
${{ steps.commits.outputs.commits }}

---

Download the APK below and install it on your Android device (API 29+)."
          else
            TITLE="$TAG — Feature Upgrades"
            BODY="## What's Changed

${{ steps.commits.outputs.commits }}

---

### Upgrade
Download and install the APK below to update your existing installation."
          fi

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          APK_PATH=$(find /tmp/apk -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "APK: $APK_PATH"
          ls -lh "$APK_PATH"

          gh release create "${{ steps.tag.outputs.tag }}" \
            "$APK_PATH" \
            --title "${{ steps.notes.outputs.title }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            --target "${{ github.sha }}"

          echo "Release ${{ steps.tag.outputs.tag }} created successfully!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
