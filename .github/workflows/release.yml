name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.0.0). Leave empty for auto-increment'
        required: false
        type: string

      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust -> target

    - name: Build Rust (arm64-v8a)
      working-directory: rust
      run: cargo ndk -t arm64-v8a build --release

    - name: Build Rust (armeabi-v7a)
      working-directory: rust
      run: cargo ndk -t armeabi-v7a build --release

    - name: Build Rust (x86_64)
      working-directory: rust
      run: cargo ndk -t x86_64 build --release

    - name: Build Rust (x86)
      working-directory: rust
      run: cargo ndk -t x86 build --release

    - name: Place native libraries for Gradle
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        mkdir -p app/src/main/jniLibs/armeabi-v7a
        mkdir -p app/src/main/jniLibs/x86_64
        mkdir -p app/src/main/jniLibs/x86
        cp rust/target/aarch64-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/arm64-v8a/
        cp rust/target/armv7-linux-androideabi/release/libNeoLibEditor.so app/src/main/jniLibs/armeabi-v7a/
        cp rust/target/x86_64-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/x86_64/
        cp rust/target/i686-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/x86/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Cache Android SDK components
      uses: actions/cache@v4
      with:
        path: |
          ~/android-sdk/ndk
          ~/android-sdk/build-tools
          ~/android-sdk/platforms
        key: android-sdk-${{ runner.os }}-${{ hashFiles('versions.properties') }}
        restore-keys: |
          android-sdk-${{ runner.os }}-

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle build directory
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties', 'versions.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APKs
      id: build
      continue-on-error: true
      run: |
        ./gradlew assembleRelease --stacktrace 2>&1 | tee build_output.log
        echo "build_status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

    - name: Check build result
      id: check
      run: |
        if [ "${{ steps.build.outputs.build_status }}" = "0" ]; then
          echo "success=true" >> $GITHUB_OUTPUT
        else
          echo "success=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload APK artifacts
      if: steps.check.outputs.success == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: LibEditor-release-${{ github.run_number }}
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Send each APK to Telegram
      if: steps.check.outputs.success == 'true'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
        COMMIT_MSG=$(echo "${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}" | head -1)

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="✅ RELEASE BUILD SUCCESSFUL%0ATime: ${BUILD_TIME}%0ACommit: ${COMMIT_MSG}%0A%0ASending APKs..."

        for APK in app/build/outputs/apk/release/*.apk; do
          APK_NAME=$(basename "$APK")
          APK_SIZE=$(du -h "$APK" | cut -f1)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@"${APK}" \
            -F caption="${APK_NAME} (${APK_SIZE})"
        done

    - name: Send failure to Telegram
      if: steps.check.outputs.success == 'false'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        COMMIT_MSG=$(echo "${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}" | head -1)

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="❌ RELEASE FAILED%0ACommit: ${COMMIT_MSG}%0ALogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
          -F chat_id="${TELEGRAM_CHAT_ID}" \
          -F document=@build_output.log \
          -F caption="Build log"

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release
        id: latest
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')

          if [ -z "$LATEST" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            TAG="v3.0.0"
          else
            CURRENT="${{ steps.latest.outputs.tag }}"

            VERSION=$(echo "$CURRENT" | sed 's/v//')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            PATCH=$((PATCH + 1))

            TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        run: |
          ARTIFACT_ID=$(gh api "repos/{owner}/{repo}/actions/artifacts" \
            --jq ".artifacts | sort_by(.created_at) | reverse | .[0].id")

          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "ERROR: No artifacts found"
            exit 1
          fi

          echo "Downloading artifact ID: $ARTIFACT_ID"
          gh api "repos/{owner}/{repo}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/apk.zip

          mkdir -p /tmp/apk
          unzip /tmp/apk.zip -d /tmp/apk

          APK_PATH=$(find /tmp/apk -name "*.apk" | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found in artifact"
            exit 1
          fi

          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          if [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            TITLE="${{ steps.tag.outputs.tag }} - Initial Release"
          else
            TITLE="${{ steps.tag.outputs.tag }} - Update"
          fi

          gh release create "${{ steps.tag.outputs.tag }}" \
            "$APK_PATH" \
            --title "$TITLE" \
            --generate-notes \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            --latest \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
