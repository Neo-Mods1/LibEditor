name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0). Leave empty for auto-increment'
        required: false
        type: string

      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release
        id: latest
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')

          if [ -z "$LATEST" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            TAG="v1.0.0"
          else
            CURRENT="${{ steps.latest.outputs.tag }}"

            VERSION=$(echo "$CURRENT" | sed 's/v//')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            PATCH=$((PATCH + 1))

            TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        run: |
          ARTIFACT_ID=$(gh api "repos/{owner}/{repo}/actions/artifacts" \
            --jq ".artifacts | sort_by(.created_at) | reverse | .[0].id")

          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "ERROR: No artifacts found"
            exit 1
          fi

          echo "Downloading artifact ID: $ARTIFACT_ID"
          gh api "repos/{owner}/{repo}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/apk.zip

          mkdir -p /tmp/apk
          unzip /tmp/apk.zip -d /tmp/apk

          APK_PATH=$(find /tmp/apk -name "*.apk" | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found in artifact"
            exit 1
          fi

          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          if [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            TITLE="${{ steps.tag.outputs.tag }} - Initial Release"
          else
            TITLE="${{ steps.tag.outputs.tag }} - Update"
          fi

          gh release create "${{ steps.tag.outputs.tag }}" \
            "$APK_PATH" \
            --title "$TITLE" \
            --generate-notes \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            --latest \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
