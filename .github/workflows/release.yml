name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0). Leave empty for auto-increment'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release
        id: latest
        run: |
          LATEST=$(gh release list --limit 1 --json tagName,isLatest --jq '.[0].tagName // empty')
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          if [ -z "$LATEST" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing release found — this will be the first release"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Latest release: $LATEST"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            TAG="v1.0.0"
          else
            CURRENT="${{ steps.latest.outputs.tag }}"
            NUM=$(echo "$CURRENT" | sed 's/[^0-9]//g')
            NUM=$((NUM + 1))
            TAG="v${NUM}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Trigger build workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: context.ref
            });
            const runId = workflow.data.id;
            console.log(`Build triggered, run ID: ${runId}`);

            // Wait for the build to complete
            let status = 'in_progress';
            let attempts = 0;
            const maxAttempts = 60;

            while (status !== 'completed' && attempts < maxAttempts) {
              await new Promise(r => setTimeout(r, 30000));
              attempts++;

              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build.yml',
                per_page: 1,
                created: `>=${new Date().toISOString().slice(0, 19)}Z`
              });

              const run = runs.data.workflow_runs[0];
              if (run) {
                status = run.status;
                console.log(`Build status: ${status} (attempt ${attempts}/${maxAttempts})`);

                if (status === 'completed' && run.conclusion !== 'success') {
                  core.setFailed(`Build failed with conclusion: ${run.conclusion}`);
                  return;
                }
              }
            }

            if (status !== 'completed') {
              core.setFailed('Build timed out after 30 minutes');
              return;
            }
            console.log('Build completed successfully');

      - name: Download APK artifact
        run: |
          gh run list --workflow=build.yml --limit=1 --json databaseId --jq '.[0].databaseId' > /tmp/run_id.txt
          RUN_ID=$(cat /tmp/run_id.txt)
          echo "Downloading artifact from run $RUN_ID"

          gh api "repos/{owner}/{repo}/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[0].id' > /tmp/artifact_id.txt
          ARTIFACT_ID=$(cat /tmp/artifact_id.txt)

          gh api "repos/{owner}/{repo}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/apk.zip
          unzip /tmp/apk.zip -d /tmp/apk
          ls -la /tmp/apk/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commits since last release
        id: commits
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          if [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$TAG"..HEAD)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- Initial release"
          fi

          # Write to file to preserve newlines
          echo "$COMMITS" > /tmp/commits.txt
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/commits.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          EXISTS="${{ steps.latest.outputs.exists }}"
          TAG="${{ steps.tag.outputs.tag }}"

          if [ "$EXISTS" = "false" ]; then
            TITLE="$TAG — Initial Release"
            BODY="## What's New

This is the first official release of **NeoLibEditor** — an ELF shared library editor for Android.

### Features
- **Address Patching** — Read and patch memory offsets in .so files
- **String Editor** — Extract, search, and replace strings
- **Multi-architecture** — ARM64, ARMv7, x86, x86_64 support
- **Backup & Revert** — Safe experimentation with automatic backups
- **Material 3 UI** — Modern design with dark/light theme support

### Included Changes
${{ steps.commits.outputs.commits }}

---

Download the APK below and install it on your Android device (API 29+)."
          else
            TITLE="$TAG — Feature Upgrades"
            BODY="## What's Changed

${{ steps.commits.outputs.commits }}

---

### Upgrade
Download and install the APK below to update your existing installation."
          fi

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          APK_PATH=$(find /tmp/apk -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "APK: $APK_PATH"

          gh release create "${{ steps.tag.outputs.tag }}" \
            "$APK_PATH" \
            --title "${{ steps.notes.outputs.title }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
