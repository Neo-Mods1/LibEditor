name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0). Leave empty for auto-increment'
        required: false
        type: string

      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release
        id: latest
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')

          if [ -z "$LATEST" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            TAG="v1.0.0"
          else
            CURRENT="${{ steps.latest.outputs.tag }}"

            VERSION=$(echo "$CURRENT" | sed 's/v//')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            PATCH=$((PATCH + 1))

            TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        run: |
          ARTIFACT_NAME="LibEditor-v${{ needs.build.outputs.run_number || github.run_number }}"

          ARTIFACT_ID=$(gh api "repos/{owner}/{repo}/actions/artifacts" \
            --jq ".artifacts | sort_by(.created_at) | reverse | .[0].id")

          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "No artifacts found, trying latest..."
            ARTIFACT_ID=$(gh api "repos/{owner}/{repo}/actions/artifacts?per_page=1" \
              --jq ".artifacts[0].id")
          fi

          echo "Downloading artifact ID: $ARTIFACT_ID"
          gh api "repos/{owner}/{repo}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/apk.zip

          mkdir -p /tmp/apk
          unzip /tmp/apk.zip -d /tmp/apk

          APK_PATH=$(find /tmp/apk -name "*.apk" | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found in artifact"
            find /tmp/apk -type f
            exit 1
          fi

          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect commits
        id: commits
        run: |
          if [ "${{ steps.latest.outputs.exists }}" = "false" ]; then
            git log --pretty=format:"%s" -20 > commits.txt
          else
            git log --pretty=format:"%s" \
              "${{ steps.latest.outputs.tag }}"..HEAD > commits.txt
          fi

          FEATURES=""
          FIXES=""
          IMPROVEMENTS=""
          OTHER=""

          while IFS= read -r line
          do
            LOWER=$(echo "$line" | tr '[:upper:]' '[:lower:]')

            if [[ "$LOWER" == feat:* ]] || [[ "$LOWER" == feature:* ]]; then
              FEATURES="${FEATURES}- ${line#*: }\n"

            elif [[ "$LOWER" == fix:* ]] || [[ "$LOWER" == bug:* ]]; then
              FIXES="${FIXES}- ${line#*: }\n"

            elif [[ "$LOWER" == improve:* ]] || [[ "$LOWER" == refactor:* ]] || [[ "$LOWER" == perf:* ]]; then
              IMPROVEMENTS="${IMPROVEMENTS}- ${line#*: }\n"

            else
              OTHER="${OTHER}- $line\n"
            fi
          done < commits.txt

          {
            echo "features<<EOF"
            echo -e "$FEATURES"
            echo "EOF"

            echo "fixes<<EOF"
            echo -e "$FIXES"
            echo "EOF"

            echo "improvements<<EOF"
            echo -e "$IMPROVEMENTS"
            echo "EOF"

            echo "other<<EOF"
            echo -e "$OTHER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          if [ "${{ steps.latest.outputs.exists }}" = "false" ]; then

            TITLE="$TAG - Initial Release"

            BODY=$(cat <<EOF
## NeoLibEditor Initial Release

The first public release of **NeoLibEditor** - a modern Android ELF shared library editor designed for binary patching and string modification.

### Main Features
- Address patching for ELF shared libraries
- String extraction and replacement
- Multi-architecture support
- Backup & restore system
- Material 3 UI
- Fast Rust-powered backend

### Supported Architectures
- ARM64
- ARMv7
- x86
- x86_64

### Requirements
- Android 10+
- API 29+

---

## Included Changes

### Features
${{ steps.commits.outputs.features }}

### Improvements
${{ steps.commits.outputs.improvements }}

### Other Changes
${{ steps.commits.outputs.other }}

---

Download the APK below to install NeoLibEditor.
EOF
)

          else

            TITLE="$TAG - Update"

            BODY=$(cat <<EOF
## What's New

### New Features
${{ steps.commits.outputs.features }}

### Fixes
${{ steps.commits.outputs.fixes }}

### Improvements
${{ steps.commits.outputs.improvements }}

### Other Changes
${{ steps.commits.outputs.other }}

---

Download the APK below to update NeoLibEditor.
EOF
)

          fi

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            "$APK_PATH" \
            --title "${{ steps.notes.outputs.title }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            --latest \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
