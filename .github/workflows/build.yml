name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-rust:
    name: Build Rust Native Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build for arm64-v8a
        working-directory: rust
        run: cargo ndk -t arm64-v8a build --release

      - name: Build for armeabi-v7a
        working-directory: rust
        run: cargo ndk -t armeabi-v7a build --release

      - name: Build for x86_64
        working-directory: rust
        run: cargo ndk -t x86_64 build --release

      - name: Build for x86
        working-directory: rust
        run: cargo ndk -t x86 build --release

      - name: Create jniLibs directories
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

      - name: Copy native libraries
        run: |
          cp rust/target/aarch64-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/arm64-v8a/
          cp rust/target/armv7-linux-androideabi/release/libNeoLibEditor.so app/src/main/jniLibs/armeabi-v7a/
          cp rust/target/x86_64-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/x86_64/
          cp rust/target/i686-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/x86/

      - name: Upload native libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: app/src/main/jniLibs/

  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libs
          path: app/src/main/jniLibs/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        run: |
          gradle assembleRelease \
            --no-daemon \
            --parallel

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LibEditor-v${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
