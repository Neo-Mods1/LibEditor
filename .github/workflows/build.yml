name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/native
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: rust-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Enable Gradle build cache
        run: |
          mkdir -p gradle
          cat > gradle/gradle.properties << 'EOF'
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Rust libraries
        run: |
          cd rust
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 build --release
          mkdir -p ../app/src/main/jniLibs
          cp target/aarch64-linux-android/release/libeditor.so ../app/src/main/jniLibs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libeditor.so ../app/src/main/jniLibs/armeabi-v7a/
          cp target/i686-linux-android/release/libeditor.so ../app/src/main/jniLibs/x86/
          cp target/x86_64-linux-android/release/libeditor.so ../app/src/main/jniLibs/x86_64/

      - name: Build APK
        run: ./gradlew assembleRelease --build-cache --parallel --configure-on-demand

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LibEditor-v${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
