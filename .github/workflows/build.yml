name: Debug Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust -> target

    - name: Build Rust (arm64-v8a)
      working-directory: rust
      run: cargo ndk -t arm64-v8a build --release

    - name: Build Rust (armeabi-v7a)
      working-directory: rust
      run: cargo ndk -t armeabi-v7a build --release

    - name: Build Rust (x86_64)
      working-directory: rust
      run: cargo ndk -t x86_64 build --release

    - name: Build Rust (x86)
      working-directory: rust
      run: cargo ndk -t x86 build --release

    - name: Place native libraries for Gradle
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        mkdir -p app/src/main/jniLibs/armeabi-v7a
        mkdir -p app/src/main/jniLibs/x86_64
        mkdir -p app/src/main/jniLibs/x86
        cp rust/target/aarch64-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/arm64-v8a/
        cp rust/target/armv7-linux-androideabi/release/libNeoLibEditor.so app/src/main/jniLibs/armeabi-v7a/
        cp rust/target/x86_64-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/x86_64/
        cp rust/target/i686-linux-android/release/libNeoLibEditor.so app/src/main/jniLibs/x86/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Cache Android SDK components
      uses: actions/cache@v4
      with:
        path: |
          ~/android-sdk/ndk
          ~/android-sdk/build-tools
          ~/android-sdk/platforms
        key: android-sdk-${{ runner.os }}-${{ hashFiles('versions.properties') }}
        restore-keys: |
          android-sdk-${{ runner.os }}-

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle build directory
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties', 'versions.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      id: build
      continue-on-error: true
      run: |
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log
        echo "build_status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

    - name: Check build result
      id: check
      run: |
        if [ "${{ steps.build.outputs.build_status }}" = "0" ]; then
          echo "success=true" >> $GITHUB_OUTPUT
        else
          echo "success=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload APK artifact
      if: steps.check.outputs.success == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: LibEditor-debug-${{ github.run_number }}
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

    - name: Send success to Telegram
      if: steps.check.outputs.success == 'true'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
        APK_SIZE=$(du -h "$APK_FILE" | cut -f1)
        COMMIT_MSG=$(echo "${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}" | head -1)

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="✅ DEBUG BUILD SUCCESSFUL%0ASize: ${APK_SIZE}%0ACommit: ${COMMIT_MSG}"

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
          -F chat_id="${TELEGRAM_CHAT_ID}" \
          -F document=@"${APK_FILE}" \
          -F caption="LibEditor debug arm64"

    - name: Send failure to Telegram
      if: steps.check.outputs.success == 'false'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        COMMIT_MSG=$(echo "${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}" | head -1)

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="❌ DEBUG FAILED%0ACommit: ${COMMIT_MSG}%0ALogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
          -F chat_id="${TELEGRAM_CHAT_ID}" \
          -F document=@build_output.log \
          -F caption="Build log"
